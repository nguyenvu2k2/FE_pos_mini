<div class="min-h-screen bg-white">
  <div class="grid min-h-screen lg:grid-cols-[1.05fr_0.95fr]">
    <section class="flex items-center justify-center px-5 py-8 sm:px-8">
      <div class="w-full max-w-md">
        <div class="mb-8">
          <div class="mb-5 flex h-12 w-12 items-center justify-center rounded-lg bg-primary text-lg font-black text-white">MC</div>
          <h1 class="text-3xl font800 font-bold text-slate-900">POS Mini Cafe</h1>
          <p class="mt-2 text-sm text-slate-500">Đăng nhập để bắt đầu bán hàng, theo dõi đơn và quản lý quán.</p>
        </div>

        <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
          <div>
            <label for="email" class="mb-1.5 block text-sm font-semibold text-slate-700">Email</label>
            <input
              id="email"
              type="email"
              formControlName="email"
              class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-primary focus:ring-4 focus:ring-blue-100"
              placeholder="admin@mini.cafe"
            >
            <p *ngIf="form.controls.email.touched && form.controls.email.invalid" class="mt-1 text-xs font-medium text-red-600">
              Email không hợp lệ.
            </p>
          </div>

          <div>
            <label for="password" class="mb-1.5 block text-sm font-semibold text-slate-700">Mật khẩu</label>
            <input
              id="password"
              type="password"
              formControlName="password"
              class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-primary focus:ring-4 focus:ring-blue-100"
              placeholder="Nhập mật khẩu"
            >
            <p *ngIf="form.controls.password.touched && form.controls.password.invalid" class="mt-1 text-xs font-medium text-red-600">
              Vui lòng nhập mật khẩu.
            </p>
          </div>

          <p *ngIf="errorMessage" class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm font-medium text-red-700">
            {{ errorMessage }}
          </p>

          <button
            type="submit"
            class="flex w-full items-center justify-center gap-2 rounded-lg bg-primary px-4 py-3 text-sm font-bold text-white transition hover:bg-primary-dark disabled:cursor-not-allowed disabled:opacity-70"
            [disabled]="isLoading"
          >
            <app-loading-spinner *ngIf="isLoading" size="sm"></app-loading-spinner>
            <span>{{ isLoading ? 'Đang đăng nhập...' : 'Đăng nhập' }}</span>
          </button>
        </form>

        <div class="mt-6 rounded-lg border border-slate-200 bg-slate-50 p-3">
          <p class="mb-2 text-xs font-bold uppercase text-slate-500">Tài khoản demo</p>
          <div class="grid gap-2 sm:grid-cols-3">
            <button
              *ngFor="let account of demoAccounts"
              type="button"
              class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-semibold text-slate-700 hover:border-primary hover:text-primary"
              (click)="fillAccount(account)"
            >
              {{ account.label }}
            </button>
          </div>
        </div>
      </div>
    </section>

    <section class="relative hidden overflow-hidden bg-slate-950 lg:block">
      <img
        src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1400&q=80"
        alt="Quầy cafe"
        class="h-full w-full object-cover opacity-80"
      >
      <div class="absolute inset-0 bg-gradient-to-t from-slate-950/85 via-slate-950/25 to-transparent"></div>
      <div class="absolute bottom-10 left-10 right-10 text-white">
        <p class="text-sm font-semibold uppercase tracking-wide text-blue-100">Mini Cafe Workflow</p>
        <p class="mt-3 max-w-lg text-4xl font-bold leading-tight">Bán hàng nhanh, kiểm kho gọn, báo cáo rõ.</p>
      </div>
    </section>
  </div>
</div>
