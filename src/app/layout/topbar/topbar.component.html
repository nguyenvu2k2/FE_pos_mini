<header class="sticky top-0 z-20 border-b border-slate-200 bg-white/95 px-4 py-3 shadow-sm backdrop-blur sm:px-6 lg:px-8">
  <div class="flex items-center justify-between gap-4">
    <div class="flex min-w-0 items-center gap-3">
      <button
        type="button"
        class="rounded-lg border border-slate-200 p-2 text-slate-600 hover:bg-slate-50 lg:hidden"
        aria-label="Mở menu"
        (click)="toggleSidebar.emit()"
      >
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
      </button>
      <h1 class="truncate text-xl font-bold text-slate-900">{{ title }}</h1>
    </div>

    <div class="flex items-center gap-3">
      <div class="hidden text-right sm:block" *ngIf="authService.currentUser() as user">
        <p class="text-sm font-semibold text-slate-900">{{ user.full_name }}</p>
        <p class="text-xs text-slate-500">{{ roleLabel() }}</p>
      </div>
      <div class="flex h-10 w-10 items-center justify-center rounded-full bg-blue-100 text-sm font-bold text-primary">
        {{ authService.currentUser()?.avatar_url || 'U' }}
      </div>
      <button
        type="button"
        class="inline-flex items-center gap-2 rounded-lg border border-slate-200 px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50"
        (click)="authService.logout()"
      >
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6A2.25 2.25 0 005.25 5.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
        </svg>
        <span class="hidden sm:inline">Đăng xuất</span>
      </button>
    </div>
  </div>
</header>
